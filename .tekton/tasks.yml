apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: nose-test

spec:
  steps:
  - name: run-test
    image: python:3.8
    script: |
      pip install nose
      nosetests

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cleanup

spec:
  steps:
  - name: cleanup
    image: registry.access.redhat.com/ubi8/ubi
    script: |
      echo "cleanup"
      rm -rf /workspace/*
